<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AdminHub Dashboard - Overview of your business metrics.">
    <title>Dashboard - AdminHub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">Admin<span>Hub</span></div>
            <nav>
                <a href="dashboard.html" class="active"><span class="nav-icon">&#127968;</span> Dashboard</a>
                <a href="users.html"><span class="nav-icon">&#128101;</span> Users</a>
                <a href="products.html"><span class="nav-icon">&#128230;</span> Products</a>
                <a href="analytics.html"><span class="nav-icon">&#128202;</span> Analytics</a>
                <a href="notifications.html"><span class="nav-icon">&#128276;</span> Notifications</a>
                <a href="settings.html"><span class="nav-icon">&#9881;</span> Settings</a>
            </nav>
        </aside>

        <!-- Main content -->
        <div class="main-content">

            <!-- Header -->
            <header class="top-header">
                <h2>Dashboard</h2>
                <div class="header-right">
                    <span class="user-email" id="userEmail"></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
                </div>
            </header>

            <!-- Page content -->
            <div class="page-content">

                <!-- Summary cards -->
                <div class="summary-cards">
                    <div class="summary-card blue">
                        <div class="card-icon" style="background:#4a6cf7;">&#128101;</div>
                        <h3>Total Users</h3>
                        <div class="value" id="totalUsers">0</div>
                    </div>
                    <div class="summary-card green">
                        <div class="card-icon" style="background:#2ecc71;">&#128230;</div>
                        <h3>Total Orders</h3>
                        <div class="value" id="totalOrders">0</div>
                    </div>
                    <div class="summary-card orange">
                        <div class="card-icon" style="background:#f59e0b;">&#128176;</div>
                        <h3>Revenue</h3>
                        <div class="value" id="totalRevenue">$0</div>
                    </div>
                    <div class="summary-card red">
                        <div class="card-icon" style="background:#e74c3c;">&#128722;</div>
                        <h3>Products</h3>
                        <div class="value" id="totalProducts">0</div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="charts-grid">
                    <div class="chart-container">
                        <h3>Monthly Orders Overview</h3>
                        <canvas id="ordersChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3>Revenue Distribution</h3>
                        <canvas id="revenueDonut"></canvas>
                    </div>
                </div>

                <!-- Recent orders -->
                <div class="chart-container" style="margin-top: 24px;">
                    <h3>Recent Orders</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Product</th>
                                <th>Amount</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersBody">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        displayUserInfo();

        function loadDashboardData() {
            var users = JSON.parse(localStorage.getItem("users")) || [];
            var orders = JSON.parse(localStorage.getItem("orders")) || [];
            var products = JSON.parse(localStorage.getItem("products")) || [];

            document.getElementById("totalUsers").textContent = users.length;
            document.getElementById("totalOrders").textContent = orders.length;
            document.getElementById("totalProducts").textContent = products.length;

            var revenue = 0;
            for (var i = 0; i < orders.length; i++) {
                revenue += orders[i].amount;
            }
            document.getElementById("totalRevenue").textContent = "$" + revenue.toFixed(2);

            var recentOrders = orders.slice(-5).reverse();
            var tbody = document.getElementById("recentOrdersBody");
            tbody.innerHTML = "";
            for (var i = 0; i < recentOrders.length; i++) {
                var o = recentOrders[i];
                tbody.innerHTML += "<tr>" +
                    "<td>" + o.id + "</td>" +
                    "<td>" + o.product + "</td>" +
                    "<td>$" + o.amount.toFixed(2) + "</td>" +
                    "<td>" + o.date + "</td>" +
                "</tr>";
            }
        }

        // Monthly orders chart
        function renderBarChart() {
            var ctx = document.getElementById("ordersChart").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
                    datasets: [{
                        label: "Orders",
                        data: [12, 19, 8, 15, 22, 10],
                        backgroundColor: ["#4a6cf7", "#6366f1", "#2ecc71", "#f59e0b", "#e74c3c", "#8b5cf6"],
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // Revenue split chart
        function renderDonutChart() {
            var ctx = document.getElementById("revenueDonut").getContext("2d");
            new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: ["Electronics", "Accessories", "Peripherals"],
                    datasets: [{
                        data: [45, 30, 25],
                        backgroundColor: ["#4a6cf7", "#2ecc71", "#f59e0b"]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: "bottom" }
                    }
                }
            });
        }

        loadDashboardData();
        renderBarChart();
        renderDonutChart();
    </script>

</body>
</html>
