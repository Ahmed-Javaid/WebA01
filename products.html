<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AdminHub - Manage products inventory.">
    <title>Products - AdminHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">Admin<span>Hub</span></div>
            <nav>
                <a href="dashboard.html"><span class="nav-icon">&#127968;</span> Dashboard</a>
                <a href="users.html"><span class="nav-icon">&#128101;</span> Users</a>
                <a href="products.html" class="active"><span class="nav-icon">&#128230;</span> Products</a>
                <a href="analytics.html"><span class="nav-icon">&#128202;</span> Analytics</a>
                <a href="notifications.html"><span class="nav-icon">&#128276;</span> Notifications</a>
                <a href="settings.html"><span class="nav-icon">&#9881;</span> Settings</a>
            </nav>
        </aside>

        <!-- Main content -->
        <div class="main-content">

            <header class="top-header">
                <h2>Products</h2>
                <div class="header-right">
                    <span class="user-email" id="userEmail"></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
                </div>
            </header>

            <!-- Page content -->
            <div class="page-content">
                <!-- Controls -->
                <div class="table-header">
                    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                        <input type="text" class="search-input" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
                        <select id="statusFilter" class="filter-select" onchange="renderProducts()">
                            <option value="">All Status</option>
                            <option value="In Stock">In Stock</option>
                            <option value="Low Stock">Low Stock</option>
                            <option value="Out of Stock">Out of Stock</option>
                        </select>
                        <select id="sortBy" class="filter-select" onchange="renderProducts()">
                            <option value="">Sort By</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="price-asc">Price (Low-High)</option>
                            <option value="price-desc">Price (High-Low)</option>
                            <option value="qty-asc">Qty (Low-High)</option>
                            <option value="qty-desc">Qty (High-Low)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
                </div>

                <!-- Products table -->
                <div class="data-table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Picture</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- Product form modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <h3 id="modalTitle">Add Product</h3>
            <form id="productForm" onsubmit="return saveProduct(event)">
                <input type="hidden" id="editProductId" value="">

                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="e.g. Wireless Mouse" required>
                </div>

                <div class="form-group">
                    <label for="productPrice">Price ($)</label>
                    <input type="number" id="productPrice" placeholder="e.g. 29.99" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="productQty">Quantity</label>
                    <input type="number" id="productQty" placeholder="e.g. 100" min="0" required>
                </div>

                <div class="form-group">
                    <label for="productStatus">Status</label>
                    <select id="productStatus">
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="productPicture">Picture URL (optional)</label>
                    <input type="text" id="productPicture" placeholder="https://example.com/image.jpg">
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        displayUserInfo();

        function getProducts() {
            return JSON.parse(localStorage.getItem("products")) || [];
        }

        function setProducts(products) {
            localStorage.setItem("products", JSON.stringify(products));
        }

        // Add a new notification at the top of the list.
        function addNotification(user, message) {
            var notifications = JSON.parse(localStorage.getItem("notifications")) || [];
            var maxId = 0;

            for (var i = 0; i < notifications.length; i++) {
                if (notifications[i].id > maxId) maxId = notifications[i].id;
            }

            notifications.unshift({
                id: maxId + 1,
                user: user,
                message: message,
                time: "just now",
                read: false
            });

            localStorage.setItem("notifications", JSON.stringify(notifications));
        }

        // Render product list with filters and sorting
        function renderProducts() {
            var products = getProducts();
            var search = document.getElementById("searchInput").value.toLowerCase();
            var statusFilter = document.getElementById("statusFilter").value;
            var sortBy = document.getElementById("sortBy").value;

            if (search) {
                products = products.filter(function(p) {
                    return p.name.toLowerCase().indexOf(search) !== -1;
                });
            }

            if (statusFilter) {
                products = products.filter(function(p) {
                    return p.status === statusFilter;
                });
            }

            if (sortBy) {
                products.sort(function(a, b) {
                    switch(sortBy) {
                        case "name-asc": return a.name.localeCompare(b.name);
                        case "name-desc": return b.name.localeCompare(a.name);
                        case "price-asc": return a.price - b.price;
                        case "price-desc": return b.price - a.price;
                        case "qty-asc": return a.quantity - b.quantity;
                        case "qty-desc": return b.quantity - a.quantity;
                        default: return 0;
                    }
                });
            }

            var tbody = document.getElementById("productsTableBody");
            tbody.innerHTML = "";

            if (products.length === 0) {
                tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; color:#94a3b8;'>No products found.</td></tr>";
                return;
            }

            for (var i = 0; i < products.length; i++) {
                var p = products[i];

                var badgeClass = "badge-active";
                if (p.status === "Low Stock") badgeClass = "badge-suspended";
                if (p.status === "Out of Stock") badgeClass = "badge-inactive";

                var imgHtml = p.picture
                    ? "<img src='" + p.picture + "' alt='" + p.name + "' class='product-thumb'>"
                    : "<div class='product-thumb-placeholder'>&#128230;</div>";

                var row = "<tr>" +
                    "<td>" + (i + 1) + "</td>" +
                    "<td>" + imgHtml + "</td>" +
                    "<td>" + p.name + "</td>" +
                    "<td>$" + p.price.toFixed(2) + "</td>" +
                    "<td>" + p.quantity + "</td>" +
                    "<td><span class='badge " + badgeClass + "'>" + p.status + "</span></td>" +
                    "<td class='actions'>" +
                        "<button class='btn btn-primary btn-sm' onclick='editProduct(" + p.id + ")'>Edit</button>" +
                        "<button class='btn btn-danger btn-sm' onclick='deleteProduct(" + p.id + ")'>Delete</button>" +
                    "</td>" +
                "</tr>";
                tbody.innerHTML += row;
            }
        }

        function openModal() {
            document.getElementById("modalTitle").textContent = "Add Product";
            document.getElementById("editProductId").value = "";
            document.getElementById("productForm").reset();
            document.getElementById("productModal").classList.add("show");
        }

        function closeModal() {
            document.getElementById("productModal").classList.remove("show");
        }

        function editProduct(id) {
            var products = getProducts();
            var product = null;
            for (var i = 0; i < products.length; i++) {
                if (products[i].id === id) { product = products[i]; break; }
            }
            if (!product) return;

            document.getElementById("modalTitle").textContent = "Edit Product";
            document.getElementById("editProductId").value = product.id;
            document.getElementById("productName").value = product.name;
            document.getElementById("productPrice").value = product.price;
            document.getElementById("productQty").value = product.quantity;
            document.getElementById("productStatus").value = product.status;
            document.getElementById("productPicture").value = product.picture || "";
            document.getElementById("productModal").classList.add("show");
        }

        function saveProduct(e) {
            e.preventDefault();
            var products = getProducts();
            var editId = document.getElementById("editProductId").value;

            var name = document.getElementById("productName").value.trim();
            var price = parseFloat(document.getElementById("productPrice").value);
            var quantity = parseInt(document.getElementById("productQty").value);
            var status = document.getElementById("productStatus").value;
            var picture = document.getElementById("productPicture").value.trim();

            if (editId) {
                // Update an existing product.
                editId = parseInt(editId);
                for (var i = 0; i < products.length; i++) {
                    if (products[i].id === editId) {
                        products[i].name = name;
                        products[i].price = price;
                        products[i].quantity = quantity;
                        products[i].status = status;
                        products[i].picture = picture;
                        break;
                    }
                }
            } else {
                // Add new product and notify
                var maxId = 0;
                for (var i = 0; i < products.length; i++) {
                    if (products[i].id > maxId) maxId = products[i].id;
                }
                products.push({
                    id: maxId + 1,
                    name: name,
                    price: price,
                    quantity: quantity,
                    status: status,
                    picture: picture
                });

                var currentUser = getCurrentUser();
                addNotification(currentUser, "Added a new product: " + name + ".");
            }

            setProducts(products);
            closeModal();
            renderProducts();
            return false;
        }

        function deleteProduct(id) {
            if (!confirm("Are you sure you want to delete this product?")) return;
            var products = getProducts();
            var filtered = [];
            for (var i = 0; i < products.length; i++) {
                if (products[i].id !== id) filtered.push(products[i]);
            }
            setProducts(filtered);
            renderProducts();
        }

        renderProducts();
    </script>

</body>
</html>
